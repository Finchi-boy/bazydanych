<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Logowanie – Rekrutacja PWR</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    .box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      width: 320px;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: #333;
    }

    label {
      display: block;
      margin-bottom: 0.3rem;
      font-size: 0.9rem;
      color: #555;
    }

    input,
    select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 0.6rem;
      background: #003366;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #004488;
    }

    .link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .flash {
      background: #ffe0e0;
      border: 1px solid #f88;
      padding: 0.5rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Rekrutacja PWR</h1>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}
    <form method="POST">
      <label>Rola</label>
      <select name="rola">
        <option value="kandydat">Kandydat</option>
        <option value="pracownik">Pracownik</option>
      </select>
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Hasło</label>
      <input type="password" name="haslo" required>
      <button type="submit">Zaloguj się</button>
    </form>
    <div class="link"><a href="/rejestracja">Zarejestruj się jako kandydat</a></div>
  </div>
</body>

</html>
